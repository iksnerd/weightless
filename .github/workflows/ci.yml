name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          gofmt -l . | tee /tmp/fmt.out
          [ ! -s /tmp/fmt.out ] || (echo "Files need formatting:" && cat /tmp/fmt.out && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build tracker
        run: go build -o weightless ./cmd/tracker/

      - name: Build CLI
        run: go build -o wl ./cmd/wl/
